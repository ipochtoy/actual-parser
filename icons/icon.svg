<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5BA3E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A90E2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="8" y="8" width="112" height="112" rx="24" ry="24" fill="url(#blueGrad)"/>

  <!-- Dove/Bird icon in white -->
  <g transform="translate(64, 64)">
    <!-- Bird body -->
    <ellipse cx="0" cy="5" rx="18" ry="22" fill="#ffffff" opacity="0.95"/>

    <!-- Bird head -->
    <circle cx="0" cy="-12" r="12" fill="#ffffff" opacity="0.95"/>

    <!-- Left wing (extended) -->
    <path d="M -8,-5 Q -35,-15 -42,-8 Q -35,-10 -15,-8 Z" fill="#ffffff" opacity="0.9"/>

    <!-- Right wing (extended) -->
    <path d="M 8,-5 Q 35,-15 42,-8 Q 35,-10 15,-8 Z" fill="#ffffff" opacity="0.85"/>

    <!-- Tail feathers -->
    <path d="M -6,22 L -8,32 L 0,28 L 8,32 L 6,22 Z" fill="#ffffff" opacity="0.9"/>

    <!-- Eye -->
    <circle cx="-3" cy="-14" r="2" fill="#4A90E2"/>

    <!-- Beak -->
    <path d="M 2,-16 L 8,-14 L 2,-12 Z" fill="#FFB74D" opacity="0.9"/>

    <!-- Wing detail lines -->
    <line x1="-12" y1="-8" x2="-30" y2="-12" stroke="#E8F4FD" stroke-width="1.5" opacity="0.6"/>
    <line x1="-10" y1="-5" x2="-28" y2="-10" stroke="#E8F4FD" stroke-width="1.5" opacity="0.6"/>
    <line x1="12" y1="-8" x2="30" y2="-12" stroke="#E8F4FD" stroke-width="1.5" opacity="0.5"/>
    <line x1="10" y1="-5" x2="28" y2="-10" stroke="#E8F4FD" stroke-width="1.5" opacity="0.5"/>
  </g>
</svg>
